<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <div class="logo">NETFLIX</div>

    <input id="search" type="text" placeholder="Search movies...">

    <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<div id="sidebar" class="sidebar">
    <p>Home</p>
    <p>Trending</p>
    <p>My List</p>
    <p>Settings</p>
</div>

<section class="hero">
    <div class="hero-text">
        <h1>Featured Movie</h1>
        <p>Watch trending movies and shows</p>
    </div>
</section>

<section class="section">
    <h2>Trending Now</h2>

    <div class="row">

        <div class="card"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66?w=600"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=600"></div>

    </div>
</section>

<section class="section">
    <h2>Popular Movies</h2>

    <div class="row">

        <div class="card"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66?w=600"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600"></div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
